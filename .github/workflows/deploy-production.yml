name: Deploy CSFAQ to Production

on:
  workflow_dispatch:

env:
  INFISICAL_ENVIRONMENT: prod
  INFISICAL_SECRET_PATH: /

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CSFAQ_DEPLOY_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.CSFAQ_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -i ~/.ssh/id_ed25519 csfaq-deploy@${{ secrets.CSFAQ_HOST }} bash << 'DEPLOY'
            set -e

            cd /home/csfaq-prod/crowd-source-faq

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Authenticating with Infisical..."
            export INFISICAL_TOKEN=$(npx @infisical/cli@0.43.40 login \
              --method=universal-auth \
              --client-id="${{ secrets.INFISICAL_CLIENT_ID }}" \
              --client-secret="${{ secrets.INFISICAL_CLIENT_SECRET }}" \
              --silent \
              --plain)

            if [ -z "$INFISICAL_TOKEN" ]; then
              echo "Infisical authentication failed"
              exit 1
            fi

            echo "==> Writing backend .env from Infisical..."
            npx @infisical/cli@0.43.40 export \
              --token="$INFISICAL_TOKEN" \
              --projectId="${{ secrets.INFISICAL_PROJECT_ID }}" \
              --env="${{ env.INFISICAL_ENVIRONMENT }}" \
              --path="${{ env.INFISICAL_SECRET_PATH }}" \
              --format=dotenv > apps/backend/.env

            echo "==> Cleaning quotes from env file..."
            sed -i "s/='\(.*\)'/=\1/; s/=\"\(.*\)\"/=\1/" apps/backend/.env

            echo "==> Forcing NODE_ENV=production..."
            sed -i 's/^NODE_ENV=.*/NODE_ENV=production/' apps/backend/.env
            if ! grep -q "^NODE_ENV=" apps/backend/.env; then
              echo "NODE_ENV=production" >> apps/backend/.env
            fi

            echo "==> Installing all workspace dependencies..."
            pnpm install --frozen-lockfile

            echo "==> Building frontend..."
            cd apps/frontend
            pnpm build
            cd ../..

            echo "==> Restarting csfaq service..."
            sudo systemctl restart csfaq.service

            echo "==> Reloading nginx..."
            sudo systemctl reload nginx

            echo "==> Debugging VPS service state..."
            echo "==> Waiting 20 seconds for compilation/startup to complete..."
            sleep 20

            echo "1. Checking if port 6767 is active:"
            ss -lptn 'sport = :6767' 2>/dev/null || netstat -lptn 2>/dev/null | grep 6767 || echo "❌ No process listening on 6767"

            echo "2. Listing running node/tsx processes:"
            ps aux | grep -E "node|tsx" | grep -v grep || echo "❌ No active Node processes found"

            echo "3. Dumping latest session log:"
            LATEST_LOG=$(ls -t logs/session_*.txt 2>/dev/null | head -n 1 || true)
            if [ -n "$LATEST_LOG" ] && [ -f "$LATEST_LOG" ]; then
              echo "   Latest log file: $LATEST_LOG"
              echo "   --- LOG CONTENT START ---"
              cat "$LATEST_LOG" || true
              echo "   --- LOG CONTENT END ---"
            else
              echo "⚠️  No session log files found!"
            fi
            
            echo "==> Deployment complete."
          DEPLOY